<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>

<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1">

<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/templatemo_style.css">

<style>
body {
  background: #111;
}

/* GALLERY IMAGES */
.gallery-img {
  width: 100%;
  cursor: pointer;
  transition: 0.3s;
  border-radius: 6px;
}

.gallery-img:hover {
  transform: scale(1.03);
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 8px;
}
</style>

</head>

<body>

<!-- NAV (marad az eredeti template-ből) -->
<div class="container menu">
  <div class="row">
    <div class="col-sm-12">
      <nav class="navbar navbar-default">
        <ul class="nav navbar-nav">
          <li><a href="index.html">HOME</a></li>
          <li><a href="about.html">ABOUT</a></li>
          <li class="current"><a href="gallery.html">GALLERY</a></li>
          <li><a href="contact.html">CONTACT</a></li>
        </ul>
      </nav>
    </div>
  </div>
</div>

<!-- GALLERY -->
<div class="container">
  <div class="row">

    <div class="col-sm-4">
      <img src="images/gallery/1.jpg" class="gallery-img">
    </div>

    <div class="col-sm-4">
      <img src="images/gallery/2.jpg" class="gallery-img">
    </div>

    <div class="col-sm-4">
      <img src="images/gallery/3.jpg" class="gallery-img">
    </div>

    <div class="col-sm-4">
      <img src="images/gallery/4.jpg" class="gallery-img">
    </div>

    <div class="col-sm-4">
      <img src="images/gallery/5.jpg" class="gallery-img">
    </div>

    <div class="col-sm-4">
      <img src="images/gallery/6.jpg" class="gallery-img">
    </div>

  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <img id="lightbox-img">
</div>

<script src="js/jquery-1.11.1.min.js"></script>

<script>
$(document).ready(function(){

  // OPEN LIGHTBOX
  $(".gallery-img").click(function(){
    $("#lightbox").fadeIn();
    $("#lightbox-img").attr("src", $(this).attr("src"));
  });

  // CLOSE ON CLICK
  $("#lightbox").click(function(){
    $(this).fadeOut();
  });

  // CLOSE ON ESC
  $(document).keydown(function(e){
    if(e.key === "Escape"){
      $("#lightbox").fadeOut();
    }
  });

});
</script>

</body>
</html>
