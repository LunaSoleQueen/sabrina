<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/font-awesome.min.css">
<link rel="stylesheet" href="css/templatemo_style.css">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow-x: hidden;
}

body {
  background: transparent !important;
}

/* BACKGROUND VIDEO */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* CONTENT OVER VIDEO */
.container {
  position: relative;
  z-index: 1;
}

/* 🔥 LILA 50% UI */
.contact-box {
  background: rgba(130, 70, 200, 0.5);
  padding: 30px;
  border-radius: 8px;
  color: #fff;
}

input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border: none;
  border-radius: 4px;
}

button {
  background: rgba(130, 70, 200, 0.8);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 4px;
}
</style>

</head>

<body>

<!-- BACKGROUND VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="images/web_bg_kicsi.mp4" type="video/mp4">
</video>

<!-- MENU -->
<div class="container menu">
  <div class="row">
    <div class="col-sm-12">
      <ul class="nav navbar-nav">
        <li><a href="index.html">HOME</a></li>
        <li><a href="about.html">ABOUT</a></li>
        <li><a href="gallery.html">GALLERY</a></li>
        <li class="current"><a href="contact.html">CONTACT</a></li>
      </ul>
    </div>
  </div>
</div>

<!-- CONTACT CONTENT -->
<div class="container">
  <div class="row">

    <div class="col-md-12">
      <div class="contact-box">
        <h1>CONTACT</h1>
        <p>Send us a message</p>

        <div class="row">

          <div class="col-md-6">
            <form>
              <input type="text" placeholder="NAME">
              <input type="email" placeholder="EMAIL">
              <textarea rows="6" placeholder="MESSAGE"></textarea>
              <button type="submit">SEND</button>
            </form>
          </div>

          <div class="col-md-6">
            <div style="width:100%; height:300px; background:#222; border-radius:6px;">
              MAP PLACEHOLDER
            </div>
          </div>

        </div>

      </div>
    </div>

  </div>
</div>

</body>
</html>
