<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    overflow-x:hidden;
}

body{
    background:transparent !important;
}

/* VIDEÓ */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* Tartalom */
.container{
    position:relative;
    z-index:2;
}

/* ===== BOXOK ===== */

.templatemo_home_top_left,
.templatemo_home_midleft,
.templatemo_home_midmid,
.templatemo_home_botleft,
.templatemo_home_botmid,
.templatemo_home_botright{

    background:rgba(130,70,200,.45) !important;

    color:#fff !important;

    border:2px solid #ff66cc !important;

    border-radius:16px;

    padding:22px;

    box-shadow:0 8px 20px rgba(0,0,0,.30);

    backdrop-filter:blur(5px);
    -webkit-backdrop-filter:blur(5px);

    margin-bottom:20px;
}

/* Az alsó három box kisebb legyen */

.templatemo_home_midleft,
.templatemo_home_midmid{
    min-height:170px;
}

/* Hero doboz */

.templatemo_home_top_left{
    min-height:220px;
}

/* Kép */

img{
    border-radius:16px;
}

/* Gombok */

button,
.templatemo_buttongreen{

    background:rgba(130,70,200,.80) !important;

    color:#fff !important;

    border-left:10px solid rgba(80,30,140,.8) !important;

    border-radius:10px;
}

/* Látogatószámláló */

.visitor-counter{
    width:100%;
    text-align:center;
    margin:30px 0;
    position:relative;
    z-index:10;
}

.visitor-counter a{
    color:#ffffff;
    text-decoration:none;
}
</style>

</head>
