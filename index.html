<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Studio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

html {
  scroll-behavior: smooth;
  scroll-snap-type: y mandatory;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* FIX NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 20px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 2px;
  opacity: 0.7;
  transition: 0.3s;
}

nav a:hover {
  opacity: 1;
  color: #a855f7;
}

/* FULL SECTIONS */
section {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 10%;
}

/* HERO */
.hero h1 {
  font-size: 90px;
  margin: 0;
  font-weight: 800;
  letter-spacing: -2px;
}

.hero p {
  opacity: 0.6;
  font-size: 18px;
}

/* SECTION TITLES */
h2 {
  font-size: 60px;
  margin: 0 0 20px 0;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.box {
  height: 200px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.4s;
}

.box:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.1);
}

/* VIDEO */
iframe {
  width: 100%;
  height: 500px;
  border-radius: 12px;
  border: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 50px;
  opacity: 0.4;
}
</style>
</head>

<body>

<nav>
  <a href="#home">HOME</a>
  <a href="#bio">BIO</a>
  <a href="#work">WORK</a>
  <a href="#video">VIDEO</a>
  <a href="#contact">CONTACT</a>
</nav>

<!-- HERO -->
<section id="home" class="hero">
  <h1>WE CREATE</h1>
  <p>Modern digital experiences & cinematic websites</p>
</section>

<!-- BIO -->
<section id="bio">
  <h2>Bio</h2>
  <p>Ez egy modern portfolio stílusú weboldal alap.</p>
</section>

<!-- WORK -->
<section id="work">
  <h2>Work</h2>

  <div class="grid">
    <div class="box">Project 1</div>
    <div class="box">Project 2</div>
    <div class="box">Project 3</div>
  </div>
</section>

<!-- VIDEO -->
<section id="video">
  <h2>Video</h2>

  <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>your@email.com</p>
</section>

<footer>
  © 2026 Creative Studio
</footer>

</body>
</html>
