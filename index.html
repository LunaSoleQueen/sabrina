<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0e0f13;
  color: white;
  scroll-behavior: smooth;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: center;
  gap: 30px;
  background: rgba(14,15,19,0.8);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: 500;
  letter-spacing: 1px;
  transition: 0.3s;
}

nav a:hover {
  color: #7c5cff;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
  margin: 0;
}

.hero p {
  opacity: 0.7;
}

/* SECTIONS */
section {
  max-width: 900px;
  margin: 100px auto;
  padding: 40px;
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
}

h2 {
  margin-top: 0;
  color: #7c5cff;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.box {
  height: 150px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  opacity: 0.5;
}
</style>
</head>

<body>

<nav>
  <a href="#home">Home</a>
  <a href="#bio">Bio</a>
  <a href="#images">Images</a>
  <a href="#videos">Videos</a>
  <a href="#contact">Contact</a>
</nav>

<div class="hero" id="home">
  <h1>Creative Portfolio</h1>
  <p>Modern web experience inspired design</p>
</div>

<section id="bio">
  <h2>Bio</h2>
  <p>Itt lesz a bemutatkozásod. Letisztult, modern stílus.</p>
</section>

<section id="images">
  <h2>Images</h2>
  <div class="grid">
    <div class="box">Image</div>
    <div class="box">Image</div>
    <div class="box">Image</div>
  </div>
</section>

<section id="videos">
  <h2>Videos</h2>
  <p>YouTube embed majd ide jön később.</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<footer>
  © 2026 Portfolio
</footer>

</body>
</html>
