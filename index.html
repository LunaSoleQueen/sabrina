<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Az én oldalam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
  margin: 0;
  padding-top: 60px;
  background: #f4f4f4;
  color: #333;
    }

    nav {
      background: #1f2a36;
  padding: 15px;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
}

    .menu {
      max-width: 800px;
      margin: auto;
      display: flex;
      gap: 20px;
    }

    .menu a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .menu a:hover {
      color: #3498db;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 40px;
      text-align: center;
    }

    section {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .button:hover {
      background: #2980b9;
    }
  </style>
</head>

<body>

  <nav>
    <div class="menu">
      <a href="#">Főoldal</a>
      <a href="#about">Rólam</a>
      <a href="#projects">Projektjeim</a>
    </div>
  </nav>

  <header>
    <h1>Szia, ez az én weboldalam 👋</h1>
    <p>GitHub Pages alap weboldal</p>
  </header>

  <section id="about">
    <h2>Rólam</h2>
    <p>Itt tudsz magadról írni. Később ezt bővítjük.</p>

    <a class="button" href="https://github.com/">GitHub profilom</a>
  </section>

  <section id="projects">
    <h2>Projektjeim</h2>
    <p>Itt majd megjelennek a dolgaid.</p>
  </section>

  <footer>
    <p>© 2026 - Az én oldalam</p>
  </footer>

</body>
</html>
