<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/font-awesome.min.css">
<link rel="stylesheet" href="css/templatemo_style.css">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow-x: hidden;
}

body {
    background: transparent !important;
}

#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

.templatemo_home_top_left {
    background: rgba(130,70,200,.45) !important;
    border: 2px solid #ff66cc !important;
    border-radius: 16px !important;
    color: #fff !important;
    padding: 20px !important;
    height: 500px !important;
    min-height: 500px !important;
    max-height: 500px !important;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
}

.templatemo_home_midleft,
.templatemo_home_midmid,
.templatemo_home_midright {
    background: rgba(130,70,200,.45) !important;
    border: 2px solid #ff66cc !important;
    border-radius: 16px !important;
    color: #fff !important;
    padding: 20px !important;
    min-height: 140px !important;
}

.hero-img {
    width: 100%;
    height: 533px;
    object-fit: cover;
    border-radius: 16px;
}

.row-flex {
    display: flex;
    flex-wrap: wrap;
    align-items: stretch;
}

.row-flex > div {
    display: flex;
}

.row-flex > div > div {
    width: 100%;
}

.site-counter {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 9999;
}

.counter-box {
    background: rgba(130,70,200,.55);
    border: 2px solid #ff66cc;
    color: #fff;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
}

.counter-box.online {
    border-color: #00ffcc;
}
</style>

</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
    <source src="images/web_bg_kicsi.mp4" type="video/mp4">
</video>

<div class="container">
    <div class="row">
        <div class="col-md-8">
            <div class="templatemo_home_top_left">
                <h1>WELCOME</h1>
                <p>Full screen video background site.</p>
            </div>
        </div>

        <div class="col-md-4">
            <img class="hero-img" src="images/P1100190_home01m.jpg">
        </div>
    </div>
</div>

<div class="container">
    <div class="row row-flex">

        <div class="col-md-4">
            <div class="templatemo_home_midleft">LEFT BOX</div>
        </div>

        <div class="col-md-4">
            <div class="templatemo_home_midmid">CENTER BOX</div>
        </div>

        <div class="col-md-4">
            <div class="templatemo_home_midright">RIGHT BOX</div>
        </div>

    </div>
</div>

<div class="site-counter">
    <div class="counter-box">Today: <span id="today"></span></div>
    <div class="counter-box">Yesterday: <span id="yesterday"></span></div>
    <div class="counter-box">All: <span id="all"></span></div>
    <div class="counter-box online">Online: <span id="online"></span></div>
</div>

<script>
(function(){

    let today = localStorage.getItem("today") || 0;
    let yesterday = localStorage.getItem("yesterday") || 0;
    let all = localStorage.getItem("all") || 0;

    const lastVisit = localStorage.getItem("lastVisit");
    const now = new Date().toDateString();

    if(lastVisit !== now){
        yesterday = today;
        today = 0;
    }

    today = parseInt(today) + 1;
    all = parseInt(all) + 1;

    localStorage.setItem("today", today);
    localStorage.setItem("yesterday", yesterday);
    localStorage.setItem("all", all);
    localStorage.setItem("lastVisit", now);

    document.getElementById("today").innerText = today;
    document.getElementById("yesterday").innerText = yesterday;
    document.getElementById("all").innerText = all;

    document.getElementById("online").innerText = 1;

})();
</script>

</body>
</html>
