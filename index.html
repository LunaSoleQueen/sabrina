<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/font-awesome.min.css">
<link rel="stylesheet" href="css/templatemo_style.css">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow-x: hidden;
}

body {
    background: transparent !important;
}

/* ===== VIDEO BACKGROUND ===== */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* ===== LAYOUT FIX (EZ OLDJA MEG A RIGHT BOX PROBLÉMÁT) ===== */
.row-flex {
    display: flex;
    flex-wrap: wrap;
    align-items: stretch;
}

/* Bootstrap oszlop teljes magasság */
.row-flex > div {
    display: flex;
}

/* BOX KITÖLTÉS */
.row-flex > div > div {
    width: 100%;
    display: flex;
    flex-direction: column;
}

/* ===== BOX DESIGN ===== */
.templatemo_home_top_left,
.templatemo_home_midleft,
.templatemo_home_midmid,
.templatemo_home_midright {

    background: rgba(130,70,200,.45) !important;

    color: #fff !important;

    border: 2px solid #ff66cc !important;

    border-radius: 16px;

    padding: 20px;

    box-shadow: 0 8px 20px rgba(0,0,0,.3);

    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);

    height: 100%;
}

/* ALSÓ BOXOK KISEBBEK */
.templatemo_home_midleft,
.templatemo_home_midmid,
.templatemo_home_midright {
    min-height: 150px;
}

/* HERO BOX */
.templatemo_home_top_left {
    min-height: 220px;
}

/* ===== KÉP FIX ===== */
.hero-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 16px;
    display: block;
}

/* ===== BUTTON ===== */
button,
.templatemo_buttongreen {
    background: rgba(130,70,200,.8) !important;
    color: #fff !important;
    border-left: 10px solid rgba(80,30,140,.8) !important;
    border-radius: 10px;
}

/* ===== COUNTER ===== */
.site-counter {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 9999;
}

.counter-box {
    background: rgba(130,70,200,.55);
    border: 2px solid #ff66cc;
    color: #fff;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    box-shadow: 0 5px 15px rgba(0,0,0,.3);
}

.counter-box.online {
    border-color: #00ffcc;
}
</style>

</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="images/web_bg_kicsi.mp4" type="video/mp4">
</video>

<!-- MENU -->
<div class="container menu">
    <div class="row">
        <div class="col-sm-4">
            <img src="images/logo lsq vége.png" style="max-width:180px;">
        </div>

        <div class="col-sm-8">
            <ul class="nav navbar-nav">
                <li class="current"><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="gallery.html">GALLERY</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </div>
    </div>
</div>

<!-- HERO -->
<div class="container">
    <div class="row">
        <div class="col-md-8">
            <div class="templatemo_home_top_left">
                <h1>WELCOME</h1>
                <p>Full screen video background site.</p>
            </div>
        </div>

        <div class="col-md-4">
            <img class="hero-img" src="images/P1100190_home01m.jpg">
        </div>
    </div>
</div>

<!-- BOXOK -->
<div class="container">
    <div class="row row-flex">

        <div class="col-md-4">
            <div class="templatemo_home_midleft">LEFT BOX</div>
        </div>

        <div class="col-md-4">
            <div class="templatemo_home_midmid">CENTER BOX</div>
        </div>

        <div class="col-md-4">
            <div class="templatemo_home_midright">RIGHT BOX</div>
        </div>

    </div>
</div>

<!-- COUNTER -->
<div class="site-counter">
    <div class="counter-box">Today: <span id="today">0</span></div>
    <div class="counter-box">Yesterday: <span id="yesterday">0</span></div>
    <div class="counter-box">All: <span id="all">0</span></div>
    <div class="counter-box online">Online: <span id="online">1</span></div>
</div>

<script>
(function(){

    let today = localStorage.getItem("today") || 0;
    let yesterday = localStorage.getItem("yesterday") || 0;
    let all = localStorage.getItem("all") || 0;

    const lastVisit = localStorage.getItem("lastVisit");
    const now = new Date().toDateString();

    if(lastVisit !== now){
        yesterday = today;
        today = 0;
    }

    today = parseInt(today) + 1;
    all = parseInt(all) + 1;

    localStorage.setItem("today", today);
    localStorage.setItem("yesterday", yesterday);
    localStorage.setItem("all", all);
    localStorage.setItem("lastVisit", now);

    document.getElementById("today").innerText = today;
    document.getElementById("yesterday").innerText = yesterday;
    document.getElementById("all").innerText = all;

    sessionStorage.setItem("online", 1);
    document.getElementById("online").innerText = 1;

})();
</script>

</body>
</html>
